name: Lembretes diários

on:
  schedule:
    # 11:00 UTC = 08:00 no horário de Brasília (UTC-3).
    - cron: "0 11 * * *"
  workflow_dispatch: {}

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar o endpoint de lembretes da API
        run: |
          curl -f -X POST "https://runup-api.onrender.com/internal/reminders/run" \
            -H "x-cron-secret: ${{ secrets.REMINDER_CRON_SECRET }}"
